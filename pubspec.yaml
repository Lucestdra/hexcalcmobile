name: hexcalc
description: "HEX CALC - portrait mobile math puzzle game"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flame: ^1.35.1
  flame_audio: ^2.11.11
  crypto: ^3.0.7
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  shared_preferences: ^2.5.5
  drift: ^2.28.0
  drift_flutter: ^0.2.7
  path_provider: ^2.1.5
  path: ^1.9.1
  # Networking + auth (Phase 7). dio is pure Dart; secure_storage and
  # connectivity_plus are standard platform-channel plugins (no native build
  # hooks), so they do not affect the sqlite3 codegen constraint.
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.4
  connectivity_plus: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.28.0
  build_runner: ^2.5.4

flutter:
  uses-material-design: true
  assets:
    - assets/gameplay/rs-v1.json
    - assets/audio/
  fonts:
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Variable.ttf
    - family: SpaceMono
      fonts:
        - asset: assets/fonts/SpaceMono-Regular.ttf
        - asset: assets/fonts/SpaceMono-Bold.ttf
          weight: 700
