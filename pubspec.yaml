name: hexcalc
description: "HEX CALC - portrait mobile math puzzle game"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flame: ^1.35.1
  flame_audio: ^2.11.11
  crypto: ^3.0.7
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  shared_preferences: ^2.5.5
  drift: ^2.28.0
  drift_flutter: ^0.2.7
  path_provider: ^2.1.5
  path: ^1.9.1
  # Networking + auth (Phase 7). dio is pure Dart; secure_storage and
  # connectivity_plus are standard platform-channel plugins (no native build
  # hooks), so they do not affect the sqlite3 codegen constraint.
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.4
  connectivity_plus: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.28.0
  build_runner: ^2.5.4
  # Icon/splash generators. Run once at release to stamp the branded native assets
  # from assets/branding/ (see docs/release-readiness.md). Not invoked by build/test.
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/gameplay/rs-v1.json
    - assets/gameplay/rs-v2.json
    - assets/gameplay/maps-v1.json
    - assets/gameplay/modes-v1.json
    - assets/audio/
  fonts:
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Variable.ttf
    - family: SpaceMono
      fonts:
        - asset: assets/fonts/SpaceMono-Regular.ttf
        - asset: assets/fonts/SpaceMono-Bold.ttf
          weight: 700

# Branded launcher icons, generated from the near-black + neon source in
# assets/branding/. Run: `dart run flutter_launcher_icons`.
flutter_launcher_icons:
  image_path: "assets/branding/icon.png"
  android: true
  ios: true
  min_sdk_android: 26
  remove_alpha_ios: true
  background_color_ios: "#05070A"
  adaptive_icon_background: "#05070A"
  adaptive_icon_foreground: "assets/branding/icon_foreground.png"

# Branded splash on the near-black brand background.
# Run: `dart run flutter_native_splash:create`.
flutter_native_splash:
  color: "#05070A"
  image: "assets/branding/splash.png"
  android_12:
    color: "#05070A"
    image: "assets/branding/splash.png"
