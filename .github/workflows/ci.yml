name: mobile-ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  analyze-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter (pinned to match .fvmrc)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.38.7
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Format check
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
